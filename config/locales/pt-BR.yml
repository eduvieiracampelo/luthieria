pt-BR:
  number:
    currency:
      format:
        unit: "R$"
        delimiter: "."
        separator: ","
        precision: 2
        format: "%u %n"
  date:
    formats:
      default: "%d/%m/%Y"
      long: "%d de %B de %Y"
      short: "%d/%m"
  time:
    formats:
      default: "%d/%m/%Y %H:%M"
      long: "%d de %B de %Y às %H:%M"
      short: "%d/%m %H:%M"
