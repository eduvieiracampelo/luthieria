<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Headstock -->
  <rect x="13" y="2" width="6" height="4" rx="1" fill="none" stroke="#000" stroke-width="2"/>
  <!-- Nut -->
  <line x1="13" y1="6" x2="19" y2="6" stroke="#000" stroke-width="1.5"/>
  <!-- Neck -->
  <rect x="14" y="6" width="4" height="10" fill="none" stroke="#000" stroke-width="1.5"/>
  <!-- Body - Acoustic guitar shape -->
  <path d="M16 16 C8 16 4 22 4 26 C4 30 8 31 16 31 C24 31 28 30 28 26 C28 22 24 16 16 16 Z" fill="none" stroke="#000" stroke-width="2"/>
  <!-- Sound hole -->
  <circle cx="16" cy="23" r="4" fill="none" stroke="#000" stroke-width="2"/>
  <!-- Bridge -->
  <rect x="11" y="27" width="10" height="2" rx="1" fill="none" stroke="#000" stroke-width="1.5"/>
  <!-- Strings -->
  <line x1="14" y1="6" x2="13" y2="28" stroke="#000" stroke-width="0.8"/>
  <line x1="15" y1="6" x2="14" y2="28" stroke="#000" stroke-width="0.8"/>
  <line x1="16" y1="6" x2="16" y2="28" stroke="#000" stroke-width="0.8"/>
  <line x1="17" y1="6" x2="18" y2="28" stroke="#000" stroke-width="0.8"/>
  <line x1="18" y1="6" x2="19" y2="28" stroke="#000" stroke-width="0.8"/>
  <!-- Tuning pegs -->
  <circle cx="13" cy="3" r="1" fill="none" stroke="#000" stroke-width="1"/>
  <circle cx="19" cy="3" r="1" fill="none" stroke="#000" stroke-width="1"/>
  <circle cx="13" cy="5" r="1" fill="none" stroke="#000" stroke-width="1"/>
  <circle cx="19" cy="5" r="1" fill="none" stroke="#000" stroke-width="1"/>
</svg>
