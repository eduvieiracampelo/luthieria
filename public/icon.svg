<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Body - Red Stratocaster shape -->
  <path fill="#D00" d="M6 14c0-2 1-4 3-5v-1h14v1c2 1 3 3 3 5v8c0 3-2 5-5 5h-1l-2 3h-2l-2-3h-4l-2 3h-2l-2-3h-1c-3 0-5-2-5-5v-8z"/>
