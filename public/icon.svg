  <line x1="14" y1="5" x2="14" y2="21" stroke="#CCC" stroke-width="0.3"/>
  <line x1="16" y1="5" x2="16" y2="21" stroke="#CCC" stroke-width="0.3"/>
  <line x1="18" y1="5" x2="18" y2="21" stroke="#CCC" stroke-width="0.3"/>
  <line x1="20" y1="5" x2="20" y2="21" stroke="#CCC" stroke-width="0.3"/>
